name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || 'anton' }}

    steps:
      - uses: actions/checkout@v4

      # No Python matrix: ruff's verdict is fixed by `target-version` in
      # pyproject, not by the interpreter running it, so a second version was
      # duplicate work for identical output.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install ruff

      - name: Ruff check
        run: ruff check hooks/ scripts/

      - name: Ruff format check
        run: ruff format --check hooks/ scripts/

  syntax:
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || 'anton' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Syntax check all Python files
        run: |
          python -c "
          import py_compile, pathlib, sys
          errors = 0
          for f in sorted(pathlib.Path('.').rglob('*.py')):
              try:
                  py_compile.compile(str(f), doraise=True)
              except py_compile.PyCompileError as e:
                  print(f'FAIL: {f}: {e}')
                  errors += 1
          print(f'{errors} errors found' if errors else 'All files OK')
          sys.exit(errors)
          "
