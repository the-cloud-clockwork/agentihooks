name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # No Python matrix: ruff's verdict is fixed by `target-version` in
      # pyproject, not by the interpreter running it, so a second version was
      # duplicate work for identical output.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # `python -m ruff`, not bare `ruff`: pip on the self-hosted runner installs
      # into the user site, whose bin dir is not on PATH.
      - name: Install dependencies
        run: |
          python -m pip install ruff

      - name: Ruff check
        run: python -m ruff check hooks/ scripts/

      - name: Ruff format check
        run: python -m ruff format --check hooks/ scripts/

  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Syntax check all Python files
        run: |
          python -c "
          import py_compile, pathlib, sys
          errors = 0
          for f in sorted(pathlib.Path('.').rglob('*.py')):
              try:
                  py_compile.compile(str(f), doraise=True)
              except py_compile.PyCompileError as e:
                  print(f'FAIL: {f}: {e}')
                  errors += 1
          print(f'{errors} errors found' if errors else 'All files OK')
          sys.exit(errors)
          "
