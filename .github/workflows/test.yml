name: Tests

on:
  pull_request:
    branches: [main]
  # dev is the deploy source and the only branch agents commit to, so it is the
  # branch that most needs gating. Without this every dev commit shipped
  # untested and only a snapshot PR to main ever ran the suite.
  push:
    branches: [dev]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Everything below runs as `python -m <tool>`, never the bare console
      # script. pip on the self-hosted runner installs into the user site
      # (~/.local), whose bin dir is not on PATH, so `pytest` and `ruff`
      # resolved to "command not found" while the packages were installed fine.
      - name: Install dependencies
        run: |
          python -m pip install -e ".[dev,all]"

      # NOT `-m unit`: only 439 of 999 tests carry that marker, so 560 —
      # including every ownership-scope test guarding what uninstall and prune
      # are allowed to delete — never ran in CI at all.
      - name: Run tests
        run: python -m pytest tests/ -v --cov=hooks --cov-report=term-missing --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: python -m pip install ruff>=0.4

      - name: Lint check
        run: python -m ruff check hooks/ scripts/ tests/

      - name: Format check
        run: python -m ruff format --check hooks/ scripts/ tests/
