name: Tests

on:
  pull_request:
    branches: [main]
  # dev is the deploy source and the only branch agents commit to, so it is the
  # branch that most needs gating. Without this every dev commit shipped
  # untested and only a snapshot PR to main ever ran the suite.
  push:
    branches: [dev]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit:
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || 'anton' }}
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev,all]"

      # NOT `-m unit`: only 439 of 999 tests carry that marker, so 560 —
      # including every ownership-scope test guarding what uninstall and prune
      # are allowed to delete — never ran in CI at all.
      - name: Run tests
        run: pytest tests/ -v --cov=hooks --cov-report=term-missing --tb=short

  lint:
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || 'anton' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff>=0.4

      - name: Lint check
        run: ruff check hooks/ scripts/ tests/

      - name: Format check
        run: ruff format --check hooks/ scripts/ tests/
