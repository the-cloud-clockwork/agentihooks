name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write
  actions: write

jobs:
  release:
    uses: The-Cloud-Clockwork/.github/.github/workflows/release-reusable.yml@main
    with:
      bump: ${{ inputs.bump }}
      # Release on dev — the working branch and deploy source; main is
      # snapshot-only (dev→main PR). release-reusable.yml now defaults this
      # input to "dev", but we set it explicitly so a future change to the
      # upstream default can't silently retarget releases at main.
      branch: dev
      downstream_workflows: "publish-pypi.yml"
    secrets:
      RELEASE_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
