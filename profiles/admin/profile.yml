# -- agentihooks fields (read by install.py) --
name: admin
description: "Admin — minimal guardrails, secrets warn-only"
mcp_categories: all

# -- MCP blacklist-by-default: only these servers stay enabled per-project --
enabledMcpServers: []

# -- otel fields (read by install.py for settings.json env block) --
otel:
  enabled: true
  endpoint: ""
  protocol: grpc
  resource_attributes:
    agent.type: admin
  langfuse:
    enabled: false
    endpoint: ""
    public_key: ""
    secret_key: ""

# -- agenticore fields (read by agenticore, not agentihooks) --
claude:
  model: sonnet
  max_turns: 80
  permission_mode: bypassPermissions
  no_session_persistence: true
  output_format: json
  worktree: true
  effort: high
  timeout: 3600

auto_pr: false
